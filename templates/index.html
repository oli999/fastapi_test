<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>오늘의 운세:{{ fortuneToday }}</h1>
    <table>
        <thead>
            <tr>
                <th>번호</th>
                <th>작성자</th>
                <th>제목</th>
                <th>작성일</th>
            </tr>
        </thead>
        <tbody>
            {% for p in posts %}
            <tr>
                <td>{{ p.num }}</td>
                <td>{{ p.writer }}</td>
                <td>{{ p.title }}</td>
                <td>{{ p.created_at }}</td> 
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
