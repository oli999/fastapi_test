name: FastAPI Deploy to Amazon Linux

on:
  push:
    branches: [ "master" ] # master 브랜치에 푸시될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}       # EC2 퍼블릭 IP
          username: ${{ secrets.EC2_USER }}                  # Amazon Linux 기본 계정
          key: ${{ secrets.EC2_KEY }}     # .pem 키 파일 내용 전체
          port: 22
          script: |
            # 1. 프로젝트 경로로 이동 (사용자 홈 디렉토리 기준)
            cd ~/fastapi/app02
            
            # 2. 최신 코드 가져오기
            # (최초에 git clone이 되어 있어야 하며, 권한 문제가 없어야 함)
            git pull origin master
            
            # 3. 가상환경 활성화 및 의존성 업데이트
            # Amazon Linux 2023 등 최신 버전은 python3를 기본으로 사용합니다.
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # 4. 기존 서버 프로세스 종료
            # 8000번 포트를 점유 중인 uvicorn을 찾아 안전하게 종료합니다.
            fuser -k 8000/tcp || true
            
            # 5. 백그라운드 실행
            # nohup으로 실행하고 로그는 app.log에 남깁니다.
            nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &